<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rozprávková krajina — knihy pre deti. Farma 1, Akin's Adventures.">
  <title>Rozprávková krajina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <img class="decor" src="animations/Castle.svg" alt="" width="673" height="674" decoding="async">
  <div class="page">
    <header class="site-header">
      <a class="logo-link" href="index.html">
        <img
          class="logo"
          src="images/logo.jpg"
          alt="Rozprávková krajina"
          width="200"
          loading="eager"
          decoding="async"
        >
      </a>
      <nav class="nav" aria-label="Hlavné menu">
        <a href="index.html" aria-current="page">Domov</a>
        <a href="#knizky">Knižky</a>
        <a href="ine.html">Iné</a>
      </nav>
    </header>

    <div class="lottie-hero" id="lottie-hero" aria-hidden="true">
      <div class="lottie-inner" id="lottie-root"></div>
    </div>

    <main id="knizky">
      <div class="content">
        <section class="book-block" aria-labelledby="farma1-title">
          <p class="badge">V predaji</p>
          <h2 class="book-title" id="farma1-title">Farma 1</h2>
          <img
            class="book-cover"
            src="images/main-book.jpg"
            alt="Obálka knihy Farma 1"
            width="320"
            loading="lazy"
            decoding="async"
          >
          <p class="lead">
            Básničky o zvieratkách bežných, všedných, aj zvláštnych. Nájdeš, ktoré to sú?
          </p>
        </section>

        <section class="book-block" aria-labelledby="akin-title">
          <h2 class="book-heading" id="akin-title">Akin's Adventures</h2>
          <p class="book-desc">
            Naučte deti po anglicky. Ešte nikdy to nebolo tak potrebné!
          </p>
          <img
            class="book-cover"
            src="images/2ndbook-Akins-Adventures.jpg"
            alt="Obálka knihy Akin's Adventures"
            width="320"
            loading="lazy"
            decoding="async"
          >
        </section>
      </div>
    </main>

    <footer class="site-footer">www.rozpravkovakrajina.sk</footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    (function () {
      var el = document.getElementById("lottie-root");
      if (!el || typeof lottie === "undefined") return;
      try {
        lottie.loadAnimation({
          container: el,
          renderer: "svg",
          loop: true,
          autoplay: true,
          path: "animations/lottie/animations/animation_1.json"
        });
      } catch (e) {
        el.closest(".lottie-hero").style.display = "none";
      }
    })();
  </script>
</body>
</html>
