<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rozprávková krajina — čoskoro.">
  <title>Rozprávková krajina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1520;
      --fg: #f4efe8;
      --muted: rgba(244, 239, 232, 0.65);
      --accent: #c9a962;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Source Sans 3", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(201, 169, 98, 0.18), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 100%, rgba(90, 60, 100, 0.25), transparent 50%),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(50, 70, 120, 0.2), transparent 45%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    main {
      max-width: 32rem;
    }

    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 600;
      font-size: clamp(2rem, 6vw, 2.75rem);
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .accent {
      color: var(--accent);
    }

    p {
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
      font-weight: 400;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.75rem auto;
      opacity: 0.7;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: rgba(244, 239, 232, 0.4);
    }
  </style>
</head>
<body>
  <main>
    <h1>Rozprávková <span class="accent">krajina</span></h1>
    <div class="divider" aria-hidden="true"></div>
    <p>Stránka sa pripravuje. Texty a obrázky doplníme čoskoro.</p>
  </main>
  <footer>www.rozpravkovakrajina.sk</footer>
</body>
</html>
